<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Killer Bee's Tobacco Shop</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; background-color: #ffd700; color: #000; }
        #age-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .gate-box { background: #1a1a1a; padding: 40px; border: 4px solid #ffd700; text-align: center; border-radius: 20px; color: white; max-width: 400px; width: 90%; }
        .gate-btn { background: #ffd700; color: #000; border: none; padding: 15px 40px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; font-size: 1.4em; width: 100%; font-family: 'Permanent Marker', cursive; }
        header { background-color: #000; padding: 30px 20px; text-align: center; border-bottom: 10px solid #000; }
        .main-logo { max-width: 400px; width: 100%; height: auto; display: block; margin: 0 auto; border-radius: 10px; }
        .container { max-width: 800px; margin: auto; padding: 40px 20px; text-align: center; }
        .info-card { background: #fff; padding: 30px; border-radius: 15px; border: 5px solid #000; box-shadow: 10px 10px 0px #000; margin-bottom: 30px; overflow: hidden; }
        h2, h3 { font-family: 'Permanent Marker', cursive; margin: 0; }
        h2 { font-size: 2.8em; }
        .hours-badge { background: #000; color: #ffd700; display: inline-block; padding: 15px 25px; border-radius: 5px; font-size: 1.5em; margin: 20px 0; font-weight: bold; }
        .address-text { font-size: 1.4em; line-height: 1.4; font-weight: bold; margin-bottom: 20px; }
        .btn-call { background: #e63946; color: #fff; padding: 20px 40px; text-decoration: none; font-weight: bold; border-radius: 50px; display: inline-block; font-size: 1.6em; margin-top: 10px; font-family: 'Permanent Marker', cursive; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        /* Style for the Map box */
        .map-container { border: 3px solid #000; border-radius: 10px; overflow: hidden; margin-top: 15px; height: 300px; }
    </style>
</head>
<body>
    <div id="age-gate">
        <div class="gate-box">
            <h1 style="font-family: 'Permanent Marker'; color: #ffd700; font-size: 3.5em; margin:0;">STOP!</h1>
            <p>You must be 19+ to enter Killer Bee's.</p>
            <button class="gate-btn" onclick="verifyAge()">I AM 19+</button>
        </div>
    </div>
    <header><img src="logo.png" alt="Killer Bee's Logo" class="main-logo"></header>
    <div class="container">
        <div class="info-card">
            <h2>OPEN 7 DAYS</h2>
            <div class="hours-badge">7:00 AM - 11:00 PM</div>
            <p style="font-size: 1.2em;">Best prices and service on the Reserve!</p>
        </div>
        <div class="info-card">
            <h3>FIND US</h3>
            <p class="address-text">3789 6th Line<br>Ohsweken, ON N0A 1M0</p>
            <div class="map-container">
                <!-- Interactive Google Map -->
                <iframe width="100%" height="100%" frameborder="0" style="border:0" 
                    src="https://www.google.com" 
                    allowfullscreen>
                </iframe>
            </div>
            <a href="tel:733-4061" class="btn-call">📞 CALL THE SHOP</a>
        </div>
    </div>
    <script>function verifyAge() { document.getElementById('age-gate').style.display = 'none'; }</script>
</body>
</html>
