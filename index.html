<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Killer Bee's Tobacco Shop</title>

<meta name="description" content="Killer Bee's Tobacco Shop in Ohsweken. Cigarettes, native brands, cigars, vapes and great prices. Open 7 days 7AM-10PM.">

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Permanent+Marker&display=swap" rel="stylesheet">

<style>

:root{
--bee-yellow:#ffd700;
--bee-black:#1a1a1a;
}

body{
font-family:'Arial Black',sans-serif;
margin:0;
background:var(--bee-yellow);
overflow-x:hidden;
}

/* AGE GATE */

#age-gate{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.gate-box{
background:#1a1a1a;
padding:40px;
border:4px solid var(--bee-yellow);
border-radius:20px;
text-align:center;
color:white;
width:90%;
max-width:420px;
}

.gate-btn{
background:var(--bee-yellow);
border:none;
padding:18px;
width:100%;
font-size:1.5em;
font-family:'Permanent Marker';
margin-top:15px;
border-radius:10px;
cursor:pointer;
}

.exit-btn{
background:#ff4444;
border:none;
padding:15px;
width:100%;
margin-top:10px;
border-radius:10px;
font-family:'Permanent Marker';
color:white;
cursor:pointer;
}

/* HEADER */

header{
text-align:center;
padding:40px 20px 10px;
}

.main-logo{
width:100%;
max-width:650px;
}

.store-photo{
width:100%;
border:8px solid black;
border-radius:20px;
margin-top:20px;
box-shadow:10px 10px 0px black;
}

/* MARQUEE */

.marquee-container{

margin:40px auto;
max-width:95%;
background:black;
padding:18px 0;
border-radius:60px;
overflow:hidden;

mask-image:linear-gradient(
to right,
transparent,
black 10%,
black 90%,
transparent
);

}

.marquee-content{
display:flex;
white-space:nowrap;
animation:scroll 15s linear infinite;
}

.marquee-item{
font-family:'Anton',sans-serif;
font-size:2.5em;
color:var(--bee-yellow);
padding:0 60px;
flex-shrink:0;
}

@keyframes scroll{

0%{transform:translateX(0);}
100%{transform:translateX(-50%);}

}

/* MAIN GRID */

.container{
max-width:900px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

/* CARDS */

.info-card{
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:25px;
border:4px solid black;
text-align:center;
box-shadow:10px 10px 0px black;
}

h2{
font-family:'Permanent Marker';
font-size:2.8em;
margin:0;
}

.hours-badge{
background:black;
color:var(--bee-yellow);
padding:15px 30px;
border-radius:15px;
font-size:2em;
margin-top:20px;
display:inline-block;
}

/* DIRECTIONS BUTTON */

.btn-directions{
background:#2a9d8f;
color:white;
padding:25px 60px;
font-size:1.8em;
text-decoration:none;
font-family:'Permanent Marker';
border-radius:50px;
display:inline-block;
margin-top:20px;
}

/* MAP */

.map-container{
max-width:900px;
margin:40px auto;
padding:0 20px;
}

.map-frame{
width:100%;
height:420px;
border-radius:20px;
border:4px solid black;
}

/* FOOTER */

footer{
background:black;
color:var(--bee-yellow);
text-align:center;
padding:25px;
font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

.container{
grid-template-columns:1fr;
}

.marquee-content{
animation:scroll 8s linear infinite;
}

.marquee-item{
font-size:2em;
padding:0 40px;
}

}

</style>
</head>

<body style="overflow:hidden">

<!-- AGE GATE -->

<div id="age-gate">

<div class="gate-box">

<h1 style="font-family:'Permanent Marker';color:var(--bee-yellow);font-size:4em;margin:0;">STOP!</h1>

<p>You must be 19+ to enter Killer Bee's.</p>

<button class="gate-btn" onclick="verifyAge()">I AM 19+</button>

<button class="exit-btn" onclick="exitSite()">NO – EXIT</butt
